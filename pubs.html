      const years = [...new Set(publications.map((item) => item.year))];

        const items = publications.filter((item) => item.year === year);
        const overview = document.createElement("section");
        overview.className = "year-overview";
        overview.innerHTML = `
          <p class="eyebrow">Year ${year}</p>
          <h2>${items.length} publications</h2>
          <p class="lead">
            Move right to browse each publication, then down for details inside
            every publication set.
          </p>
        `;
        slidesRoot.appendChild(overview);

        items.forEach((item, index) => {
          const group = document.createElement("section");
          group.innerHTML = `
            <section class="publication-slide">
              <p class="eyebrow">${item.year} | ${item.type}</p>
              <h2>${item.title}</h2>
              <p class="meta-line">${item.venue}</p>
              <p class="meta-line">${item.authors}</p>
              <p class="publication-count">${index + 1} of ${items.length} in ${year}</p>
            </section>
            <section class="detail-slide">
              <p class="eyebrow">Reference Details</p>
              <div class="detail-grid">
                <div class="detail-card">
                  <span class="detail-label">Title</span>
                  <p>${item.title}</p>
                </div>
                <div class="detail-card">
                  <span class="detail-label">Authors</span>

                <div class="detail-card">

      const deck = new Reveal({
        controls: true,
        progress: true,
        hash: true,
        center: true,
        transition: "slide",
        navigationMode: "default"

      deck.initialize();

  </body>
</html>
